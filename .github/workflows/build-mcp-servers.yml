name: Build MCP Servers

on:
  push:
    paths:
      - plugins/expo-rn-plugin/mcps/**
      - .github/workflows/build-mcp-servers.yml
  pull_request:
    paths:
      - plugins/expo-rn-plugin/mcps/**
      - .github/workflows/build-mcp-servers.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [expo-mcp-server, database-mcp-server]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Debug yarn environment
        run: |
          echo "PATH=$PATH"
          echo "which yarn: $(which yarn)"
          echo "yarn version: $(yarn --version 2>&1)"
          echo "npm bin -g: $(npm bin -g 2>/dev/null || npm prefix -g)/bin"
          echo "ls yarn in npm bin:"
          ls "$(npm prefix -g)/bin/yarn" 2>/dev/null || echo "not found"

      - name: Install & build ${{ matrix.server }}
        working-directory: plugins/expo-rn-plugin/mcps/${{ matrix.server }}
        run: yarn install --immutable && yarn build

      - name: Check dist/ is up to date
        working-directory: plugins/expo-rn-plugin/mcps/${{ matrix.server }}
        run: |
          if ! git diff --quiet dist/; then
            echo "dist/ is out of sync with source. Run 'yarn build' and commit the result."
            git diff --stat dist/
            exit 1
          fi
