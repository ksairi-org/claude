name: Build MCP Servers

on:
  push:
    paths:
      - plugins/expo-rn-plugin/mcps/**
  pull_request:
    paths:
      - plugins/expo-rn-plugin/mcps/**

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server: [expo-mcp-server, supabase-mcp-server]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install & build ${{ matrix.server }}
        working-directory: plugins/expo-rn-plugin/mcps/${{ matrix.server }}
        run: yarn install --immutable && yarn --silent build

      - name: Check dist/ is up to date
        working-directory: plugins/expo-rn-plugin/mcps/${{ matrix.server }}
        run: |
          if ! git diff --quiet dist/; then
            echo "dist/ is out of sync with source. Run 'yarn build' and commit the result."
            git diff --stat dist/
            exit 1
          fi
